name: scan

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

jobs:
  scan:
    runs-on: [ self-hosted, linux ]
    env:
      GHCR_PAT: ${{ secrets.GHCR_PAT }}

    steps:
      - name: Login (gh + GHCR)
        uses: ./.github/actions/login
        with:
          ghcr-pat: ${{ secrets.GHCR_PAT }}

      - name: Set Trivy version
        id: trivy_info
        run: |
          set -euo pipefail
          # Prefer trivy installed in the runner image; otherwise fallback to unknown
          if command -v trivy >/dev/null 2>&1; then
            TRIVY_VERSION=$(trivy --version 2>/dev/null | head -n1 | grep -oE '[0-9]+(\.[0-9]+)+') || TRIVY_VERSION=unknown
          else
            TRIVY_VERSION=unknown
          fi
          echo "trivy_version=${TRIVY_VERSION}" >> $GITHUB_OUTPUT

      - name: Compute Dockerfile hash
        id: dockerfile_hash
        run: |
          if [ -f Dockerfile ]; then
            H=$(sha256sum Dockerfile | cut -c1-7)
          else
            H=no-dockerfile
          fi
          echo "dockerfile_hash=$H" >> $GITHUB_OUTPUT

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: .trivycache
          key: trivy-db-${{ runner.os }}-${{ steps.trivy_info.outputs.trivy_version }}-${{ steps.dockerfile_hash.outputs.dockerfile_hash }}-v1
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Ensure Trivy DB
        run: |
          mkdir -p .trivycache
          # Use trivy from the runner image
          trivy --cache-dir ${{ github.workspace }}/.trivycache --download-db-only || true

      # Login centralizado já realizado acima pelo action composto

      - name: Pull image
        run: |
          docker pull ${{ inputs.image }}

      - name: Scan image (Trivy)
        run: |
          trivy image --cache-dir ${{ github.workspace }}/.trivycache --severity CRITICAL,HIGH --exit-code 1 ${{ inputs.image }}
