name: promote

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      final_tag:
        required: true
        type: string

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Promote image
        run: |
          docker pull ${{ inputs.image }}
          docker tag ${{ inputs.image }} ${{ inputs.final_tag }}
          docker push ${{ inputs.final_tag }}
