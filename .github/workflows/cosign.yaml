name: cosign

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

jobs:
  sign:
    runs-on: [ self-hosted, linux ]

    steps:
      - name: Validate input
        run: |
          set -euo pipefail

          IMAGE="${{ inputs.image }}"

          if [[ -z "$IMAGE" ]]; then
            echo "Image input is empty" >&2
            exit 1
          fi

          if [[ "$IMAGE" != *@sha256:* ]]; then
            echo "Image must be a digest (ghcr.io/...@sha256:...)" >&2
            echo "Received: $IMAGE" >&2
            exit 1
          fi

      - name: Debug image (optional)
        run: |
          echo "Signing image: ${{ inputs.image }}"

      - name: Sign image (cosign OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail

          cosign sign \
            --yes \
            "${{ inputs.image }}"

      - name: Attest provenance
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail

          cosign attest \
            --yes \
            --type slsaprovenance \
            "${{ inputs.image }}"
