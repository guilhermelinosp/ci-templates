name: login

on:
  workflow_call:

jobs:
  login:
    runs-on: [ self-hosted, linux ]
    steps:
      - name: Login no GitHub CLI (gh)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          if gh auth status; then
            echo "Login no gh CLI bem-sucedido."
          else
            echo "Falha no login do gh CLI." >&2
            exit 1
          fi

      - name: Login no GHCR (Docker)
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          if docker info | grep -q 'ghcr.io'; then
            echo "Login no GHCR (Docker) bem-sucedido."
          else
            echo "Falha no login do GHCR (Docker)." >&2
            exit 1
          fi
