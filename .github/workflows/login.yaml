name: login

on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  login:
    runs-on: [ self-hosted, linux ]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
