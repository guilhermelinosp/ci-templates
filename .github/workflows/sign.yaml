name: sign

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

jobs:
  sign:
    runs-on: [ self-hosted, linux ]

    steps:
      - name: Ensure cosign is available
        run: |
          if ! command -v cosign >/dev/null 2>&1; then
            echo "cosign not found in runner image; please ensure the runner image includes cosign or re-enable the install step" >&2
            exit 1
          fi

      - name: Sign image
        run: |
          cosign sign --yes ${{ inputs.image }}
