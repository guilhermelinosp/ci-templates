name: release

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string

jobs:
  release:
    runs-on: [ self-hosted, linux ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]" > /dev/null 2>&1
          git config user.email "github-actions[bot]@users.noreply.github.com" > /dev/null 2>&1

      - name: Create version tag
        run: |
          # Prefer explicit input version from caller. If not provided, derive a sensible default.
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            if [[ "${{ github.ref_type }}" == "tag" ]]; then
              VERSION="${{ github.ref_name }}"
            else
              VERSION="v1.0.${{ github.run_number }}"
            fi
          fi

          git tag -a "$VERSION" -m "Release $VERSION" > /dev/null 2>&1
          git push origin "$VERSION" > /dev/null 2>&1 || true
