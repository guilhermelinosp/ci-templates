name: release

on:
  workflow_call:

jobs:
  release:
    runs-on: [ self-hosted, linux ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]" > /dev/null 2>&1
          git config user.email "github-actions[bot]@users.noreply.github.com" > /dev/null 2>&1

      - name: Create version tag
        run: |
          # Automatic versioning: if the workflow was triggered by a tag, use it.
          # Otherwise determine the latest semver tag (vMAJOR.MINOR.PATCH) and bump the patch.
          set -euo pipefail

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            # Ensure we have tags
            git fetch --tags || true

            # Find latest semver tag starting with 'v'
            LATEST_TAG=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1 || true)

            if [ -z "$LATEST_TAG" ]; then
              VERSION="v1.0.0"
            else
              # Strip leading 'v'
              TAG_NUM=${LATEST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG_NUM"
              PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          echo "Creating tag: $VERSION"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION" || true
