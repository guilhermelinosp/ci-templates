name: release

on:
  workflow_call:
    outputs:
      version:
        description: "Created version tag (eg. v1.2.3)"
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    runs-on: [ self-hosted, linux ]

    outputs:
      version: ${{ steps.set_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]" > /dev/null 2>&1
          git config user.email "github-actions[bot]@users.noreply.github.com" > /dev/null 2>&1

      - name: Create version tag
        run: |
          set -euo pipefail

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            git fetch --tags > /dev/null 2>&1 || true

            LATEST_TAG=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1 || true)

            if [ -z "$LATEST_TAG" ]; then
              VERSION="v1.0.0"
            else
              TAG_NUM=${LATEST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG_NUM"
              PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          git tag -a "$VERSION" -m "Release $VERSION" > /dev/null 2>&1
          git push origin "$VERSION" > /dev/null 2>&1 || true

          TARGET_COMMIT=$(git rev-parse "$VERSION")
          git tag -f latest "$TARGET_COMMIT" > /dev/null 2>&1
          git push --force origin refs/tags/latest > /dev/null 2>&1 || true

          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update VERSION file on main
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            git fetch origin main > /dev/null 2>&1
            git checkout -B main origin/main > /dev/null 2>&1
          else
            git checkout -B main > /dev/null 2>&1
          fi

          echo "$VERSION" > VERSION

          if git diff --quiet -- VERSION; then
            echo "VERSION unchanged; nothing to commit" > /dev/stderr
          else
            git add VERSION > /dev/null 2>&1
            git commit -m "chore(release): update VERSION to $VERSION" > /dev/null 2>&1
            git push origin main > /dev/null 2>&1
          fi

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PREV_TAG=$(git tag --list 'v[0-9]*' --sort=-v:refname | awk -v v="$VERSION" '$0!=v{print; exit}') || true

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --no-merges --pretty=format:'- %s (%h)' ${PREV_TAG}..${VERSION} || true)
          else
            NOTES=$(git log --no-merges --pretty=format:'- %s (%h)' -n 50 ${VERSION} || true)
          fi

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Updating existing release $VERSION"
            gh release edit "$VERSION" --title "$VERSION" --notes "$NOTES" || true
          else
            echo "Creating release $VERSION"
            gh release create "$VERSION" --title "$VERSION" --notes "$NOTES" || true
          fi

      - name: Set workflow output
        id: set_version
        run: |
          echo "version=$VERSION" >> $GITHUB_OUTPUT
