name: push

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  push:
    runs-on: [ self-hosted, linux ]

    permissions:
      contents: read
      packages: write

    concurrency:
      group: image-push-${{ github.repository }}
      cancel-in-progress: true

    steps:
      - name: Authenticate to GHCR
        run: |
          set -euo pipefail
          echo "::add-mask::${{ secrets.GITHUB_TOKEN }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Validate inputs
        run: |
          set -euo pipefail

          IMAGE="${{ inputs.image }}"
          VERSION="${{ inputs.version }}"

          if [[ "$IMAGE" != *@sha256:* ]]; then
            echo "Input image must be a digest (ghcr.io/...@sha256:...)" >&2
            exit 1
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Version cannot be empty" >&2
            exit 1
          fi

      - name: Promote image (atomic)
        run: |
          set -euo pipefail

          SRC="${{ inputs.image }}"
          DST="ghcr.io/${{ github.repository }}"
          VERSION="${{ inputs.version }}"

          docker buildx imagetools create \
            --tag "$DST:latest" \
            --tag "$DST:$VERSION" \
            "$SRC"
