name: push

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  push:
    runs-on: [ self-hosted, linux ]

    permissions:
      contents: read
      packages: write

    concurrency:
      group: image-push-${{ github.repository }}
      cancel-in-progress: true

    steps:
      - name: Authenticate to GHCR
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Validate inputs
        run: |
          set -euo pipefail

          IMAGE="${{ inputs.image }}"
          VERSION="${{ inputs.version }}"

          if [[ "$IMAGE" != *@sha256:* ]]; then
            echo "Input image must be a digest (ghcr.io/...@sha256:...)"
            exit 1
          fi

          if [ -z "$VERSION" ]; then
            echo "Version cannot be empty"
            exit 1
          fi

      - name: Pull image by digest
        run: |
          set -euo pipefail
          docker pull "${{ inputs.image }}"

      - name: Promote image
        run: |
          set -euo pipefail

          SRC="${{ inputs.image }}"
          DST="ghcr.io/${{ github.repository }}"
          VERSION="${{ inputs.version }}"

          docker tag "$SRC" "$DST:latest"
          docker push "$DST:latest"

          docker tag "$SRC" "$DST:$VERSION"
          docker push "$DST:$VERSION"

          SHA_TAG=$(echo "$SRC" | grep -oE ':[a-f0-9]{7,}$' | sed 's/^://')
          if [ -n "$SHA_TAG" ]; then
            docker rmi "$DST:$SHA_TAG" || true
          fi

          echo "Promoted $SRC to $DST:latest and $DST:$VERSION"
