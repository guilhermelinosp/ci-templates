name: push

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      version:
        required: false
        type: string

jobs:
  push:
    runs-on: [ self-hosted, linux ]

    concurrency:
      group: image-push-${{ github.repository }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GHCR
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull SHA-tagged image
        run: |
          docker pull ${{ inputs.image }}

      - name: Promote image (latest e versão)
        run: |
          IMAGE=${{ inputs.image }}
          IMAGE_BASE=ghcr.io/${{ github.repository }}

          # Tag e push apenas as tags desejadas
          docker tag $IMAGE $IMAGE_BASE:latest
          docker push $IMAGE_BASE:latest

          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            docker tag $IMAGE $IMAGE_BASE:$VERSION
            docker push $IMAGE_BASE:$VERSION
          fi

          # Remove a imagem SHA localmente (opcional, não remove do GHCR)
          docker rmi $IMAGE || true
