name: pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  login:
    uses: ../login.yaml

  release:
    needs: login
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yaml@latest
