name: build

on:
  workflow_call:
    outputs:
      image:
        value: ${{ jobs.build.outputs.image }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Read config
        id: config
        run: |
          IMAGE_NAME=$(grep '^image:' .ci/config.yml | awk '{print $2}')
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Define image
        id: meta
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ steps.config.outputs.image_name }}:${{ github.sha }}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Debug output
        run: echo "OUTPUT=${{ steps.meta.outputs.image }}"

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push
        run: |
          docker build -t ${{ steps.meta.outputs.image }} .
          docker push ${{ steps.meta.outputs.image }}
