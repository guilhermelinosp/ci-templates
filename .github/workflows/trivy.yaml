name: trivy

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

jobs:
  scan:
    runs-on: [ self-hosted, linux ]

    steps:
      - name: Validate input
        run: |
          set -euo pipefail

          IMAGE="${{ inputs.image }}"

          if [[ "$IMAGE" != *@sha256:* ]]; then
            echo "Image must be a digest (ghcr.io/...@sha256:...)" >&2
            exit 1
          fi

      - name: Scan image (SARIF)
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          IMAGE="${{ inputs.image }}"

          trivy image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            --no-progress \
            "$IMAGE"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      - name: Upload Trivy report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.sarif

      - name: Warn on vulnerabilities (non-blocking)
        run: |
          set -euo pipefail

          COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' trivy.sarif)

          if [ "$COUNT" -gt 0 ]; then
            echo "::warning::$COUNT HIGH/CRITICAL vulnerabilities found"
          else
            echo "No HIGH/CRITICAL vulnerabilities"
          fi
