name: buildx

on:
  workflow_call:
    outputs:
      image:
        value: ${{ jobs.buildx.outputs.image }}

jobs:
  buildx:
    runs-on: [ self-hosted, linux ]

    outputs:
      image: ${{ steps.meta_digest.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GHCR
        run: |
          set -euo pipefail
          echo "::add-mask::${{ secrets.GITHUB_TOKEN }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin > /dev/null 2>&1

      - name: Set image name from config.yml
        id: image_name
        run: |
          IMAGE_NAME=$(yq '.image' config.yml)
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Define image (temporary tag)
        id: meta_tag
        run: |
          REPO=${{ github.repository }}
          IMAGE_NAME=${{ steps.image_name.outputs.name }}
          IMAGE=ghcr.io/${REPO}/${IMAGE_NAME}:temp-local
          echo "tag=$IMAGE" >> $GITHUB_OUTPUT

      - name: Setup buildx
        run: |
          set -euo pipefail
          docker buildx create --name ci-builder --driver docker-container --use || docker buildx use ci-builder > /dev/null 2>&1

      - name: Build and push (temporary tag)
        id: build
        run: |
          set -euo pipefail

          IMAGE=${{ steps.meta_tag.outputs.tag }}
          CACHE_IMAGE=ghcr.io/${{ github.repository }}/cache:cache

          # Build and push only for temporary tag (not SHA)
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            --push \
            --cache-from=type=registry,ref=$CACHE_IMAGE \
            --cache-to=type=registry,ref=$CACHE_IMAGE,mode=max \
            -t $IMAGE . > /dev/null 2>&1

      - name: Resolve digest (final output)
        id: meta_digest
        run: |
          set -euo pipefail

          IMAGE=${{ steps.meta_tag.outputs.tag }}

          DIGEST=$(docker buildx imagetools inspect $IMAGE | grep Digest | head -n1 | awk '{print $2}')

          FINAL_IMAGE="ghcr.io/${{ github.repository }}@${DIGEST}"

          echo "image=$FINAL_IMAGE" >> $GITHUB_OUTPUT
