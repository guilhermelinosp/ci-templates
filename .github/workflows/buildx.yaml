name: buildx

on:
  workflow_call:
    outputs:
      image:
        value: ${{ jobs.buildx.outputs.image }}

jobs:
  buildx:
    runs-on: [ self-hosted, linux ]

    outputs:
      image: ${{ steps.meta_digest.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GHCR
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Define image (tag temporária)
        id: meta_tag
        run: |
          REPO=${{ github.repository }}
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE=ghcr.io/${REPO}:${SHORT_SHA}
          echo "tag=$IMAGE" >> $GITHUB_OUTPUT

      - name: Setup buildx
        run: |
          set -euo pipefail
          docker buildx create --name ci-builder --driver docker-container --use || docker buildx use ci-builder

      - name: Build and push
        id: build
        run: |
          set -euo pipefail

          IMAGE=${{ steps.meta_tag.outputs.tag }}
          CACHE_IMAGE=ghcr.io/${{ github.repository }}:cache

          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            --push \
            --cache-from=type=registry,ref=$CACHE_IMAGE \
            --cache-to=type=registry,ref=$CACHE_IMAGE,mode=max \
            -t $IMAGE .

      - name: Resolve digest (output final)
        id: meta_digest
        run: |
          set -euo pipefail

          IMAGE=${{ steps.meta_tag.outputs.tag }}

          DIGEST=$(docker buildx imagetools inspect $IMAGE | grep Digest | head -n1 | awk '{print $2}')

          FINAL_IMAGE="ghcr.io/${{ github.repository }}@${DIGEST}"

          echo "image=$FINAL_IMAGE" >> $GITHUB_OUTPUT
