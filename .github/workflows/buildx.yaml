name: buildx

on:
  workflow_call:
    outputs:
      image:
        value: ${{ jobs.build.outputs.image }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  buildx:
    runs-on: [ self-hosted, linux ]

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Define image
        id: meta
        run: |
          REPO=${{ github.repository }}
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE=ghcr.io/${REPO}:${SHORT_SHA}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Check buildx version
        run: |
          docker buildx version

      - name: Setup buildx
        run: |
          if ! docker buildx inspect ci-builder >/dev/null 2>&1; then
            docker buildx create --name ci-builder --driver docker-container --use
          else
            docker buildx use ci-builder || true
          fi
          docker buildx inspect --bootstrap

      - name: Build with registry cache
        run: |
          docker buildx use ci-builder || true
          docker buildx build \
            --load \
            --cache-from=type=registry,ref=ghcr.io/${{ github.repository }}:cache \
            --cache-to=type=registry,ref=ghcr.io/${{ github.repository }}:cache,mode=max,compress=true \
            -t ${{ steps.meta.outputs.image }} .

      - name: Push SHA-tagged image to GHCR
        run: |
          docker push ${{ steps.meta.outputs.image }}
